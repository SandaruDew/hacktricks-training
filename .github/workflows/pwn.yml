name: assume
on: [push, workflow_dispatch]

permissions:
  id-token: write        # REQUIRED — lets the job request the OIDC JWT
  contents: read
jobs:
  assume:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::525923404156:role/sts-lab-2-target
          aws-region: us-east-1
          # audience defaults to sts.amazonaws.com — matches the aud condition

      - name: Read the flag
        run: |
          aws sts get-caller-identity
          aws secretsmanager get-secret-value \
            --secret-id flag_sts_lab_2 \
            --region us-east-1 \
            --query SecretString --output text